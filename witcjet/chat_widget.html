<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Chat - Чат Виджет с Liquid Glass</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .chat-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 400px;
            height: 600px;
            backdrop-filter: blur(18px) saturate(200%) brightness(1.1);
            -webkit-backdrop-filter: blur(18px) saturate(200%) brightness(1.1);
            background: rgba(255, 255, 255, 0.13);
            border: 1.5px solid rgba(255, 255, 255, 0.40);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28),
                        inset 0 1.5px 0 rgba(255, 255, 255, 0.52);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 600;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            font-size: 14px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        .chat-message {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 8px;
            border-left: 3px solid rgba(100, 200, 255, 0.6);
            color: #fff;
            font-size: 13px;
            animation: slideIn 0.3s ease-out;
        }

        .chat-message.gift {
            border-left-color: rgba(255, 200, 100, 0.8);
            background: rgba(255, 200, 100, 0.1);
        }

        .chat-message.system {
            border-left-color: rgba(150, 200, 150, 0.8);
            background: rgba(150, 200, 150, 0.1);
            text-align: center;
            font-weight: 600;
        }

        .chat-username {
            font-weight: 700;
            color: rgb(100, 220, 255);
            margin-right: 6px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-input {
            padding: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            padding: 8px 12px;
            color: #fff;
            font-size: 12px;
            outline: none;
        }

        .chat-input input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .chat-input input:focus {
            border-color: rgba(100, 200, 255, 0.6);
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.3);
        }

        .chat-input button {
            background: rgba(100, 200, 255, 0.3);
            border: 1px solid rgba(100, 200, 255, 0.6);
            color: #fff;
            border-radius: 6px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .chat-input button:hover {
            background: rgba(100, 200, 255, 0.5);
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">💬 Live Chat</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Имитация сообщения..." readonly>
            <button onclick="addTestMessage()">Тест</button>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin || 'http://localhost:5000';
        const messagesContainer = document.getElementById('chatMessages');

        class ChatWidget {
            constructor() {
                this.maxMessages = 50;
                this.messages = [];
                this.simulateMessages();
            }

            addMessage(username, text, type = 'normal') {
                const message = {
                    username,
                    text,
                    type,
                    timestamp: new Date()
                };

                this.messages.push(message);
                if (this.messages.length > this.maxMessages) {
                    this.messages.shift();
                }

                this.render();
            }

            addGift(username, gift, count) {
                this.addMessage(
                    username,
                    `отправил(а) ${gift} ×${count}`,
                    'gift'
                );
            }

            render() {
                messagesContainer.innerHTML = '';
                this.messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `chat-message ${msg.type}`;

                    if (msg.type === 'gift') {
                        div.innerHTML = `<span class="chat-username">${msg.username}</span>${msg.text}`;
                    } else if (msg.type === 'system') {
                        div.textContent = msg.text;
                    } else {
                        div.innerHTML = `<span class="chat-username">${msg.username}:</span>${msg.text}`;
                    }

                    messagesContainer.appendChild(div);
                });

                // Auto-scroll to bottom
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            simulateMessages() {
                const names = ['DanulO', 'XpnK', 'Kruz', 'TikTok_Fan', 'VideoMaster'];
                const messages = ['Nice!', 'Красиво', 'GG', 'LUL', 'ПОГ', 'Amazing stream!'];

                setInterval(() => {
                    if (Math.random() > 0.7) {
                        const name = names[Math.floor(Math.random() * names.length)];
                        const text = messages[Math.floor(Math.random() * messages.length)];
                        this.addMessage(name, text);
                    }
                }, 3000);
            }
        }

        function addTestMessage() {
            window.chat.addMessage('TestUser', 'Это тестовое сообщение!');
        }

        window.addEventListener('load', () => {
            window.chat = new ChatWidget();
            
            // Пример добавления подарков
            setTimeout(() => window.chat.addGift('XpnK', 'Rose', 5), 2000);
            setTimeout(() => window.chat.addGift('Kruz', 'Gift', 3), 5000);
        });
    </script>
</body>
</html>
